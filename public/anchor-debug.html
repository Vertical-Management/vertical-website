<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anchor Debug - Editor Responsive</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0f1218;
      --panel: #171c25;
      --card: #1d2430;
      --line: #2d3748;
      --text: #e8edf5;
      --muted: #9aa7bd;
      --coffee: #22c55e;
      --pack: #38bdf8;
      --anchor: #f43f5e;
      --handle: #f59e0b;
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 100vh;
    }
    .panel {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 14px;
      overflow: auto;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 18px;
      line-height: 1.2;
    }
    .subtitle {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .group {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.01);
    }
    .group h2 {
      margin: 0 0 8px;
      font-size: 12px;
      letter-spacing: .2px;
      color: #d7e1f0;
      text-transform: uppercase;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .row:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    input, select, textarea, button {
      width: 100%;
      border: 1px solid #3a465c;
      border-radius: 8px;
      background: #101622;
      color: var(--text);
      padding: 8px;
      font-size: 12px;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #7aa2ff;
      box-shadow: 0 0 0 2px rgba(122,162,255,0.2);
    }
    textarea {
      min-height: 100px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
    }
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    button {
      background: #1a2333;
      cursor: pointer;
      transition: .15s ease;
    }
    button:hover { background: #233049; }
    .status {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      min-height: 16px;
    }

    .workspace {
      padding: 14px;
      overflow: auto;
      display: grid;
      grid-template-rows: auto auto;
      gap: 14px;
      align-content: start;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      padding: 10px;
    }
    .card h3 {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .main-stage-wrap {
      overflow: auto;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      padding: 8px;
    }
    .stage {
      position: relative;
      user-select: none;
      touch-action: none;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%) -10px 0/20px 20px,
        linear-gradient(-45deg, rgba(255,255,255,0.05) 25%, transparent 25%) -10px 0/20px 20px,
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.05) 75%) -10px 0/20px 20px,
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.05) 75%) -10px 0/20px 20px,
        #0b1321;
      overflow: hidden;
      margin: 0 auto;
    }

    .layer {
      position: absolute;
      cursor: move;
      overflow: visible;
    }
    .layer.coffee { border: 2px solid var(--coffee); }
    .layer.pack { border: 2px solid var(--pack); }
    .layer.active {
      box-shadow: 0 0 0 2px rgba(255,255,255,0.9), 0 0 0 5px rgba(255,255,255,0.25);
    }
    .layer img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .anchor-handle {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid white;
      background: var(--anchor);
      transform: translate(-50%, -50%);
      cursor: grab;
      z-index: 20;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5);
    }
    .anchor-handle:active { cursor: grabbing; }

    .resize-handle {
      position: absolute;
      right: -8px;
      bottom: -8px;
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 2px solid white;
      background: var(--handle);
      cursor: nwse-resize;
      z-index: 20;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5);
    }

    .label-badge {
      position: absolute;
      top: -22px;
      left: 0;
      padding: 2px 6px;
      font-size: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.5);
      color: #fff;
      pointer-events: none;
      white-space: nowrap;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    .preview-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #151c28;
    }
    .preview-title {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .preview-stage-wrap {
      overflow: auto;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0b1321;
      padding: 6px;
      min-height: 120px;
    }
    .preview-stage {
      position: relative;
      margin: 0 auto;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%) -10px 0/20px 20px,
        linear-gradient(-45deg, rgba(255,255,255,0.05) 25%, transparent 25%) -10px 0/20px 20px,
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.05) 75%) -10px 0/20px 20px,
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.05) 75%) -10px 0/20px 20px,
        #0b1321;
      overflow: hidden;
    }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .panel { border-right: 0; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>Editor de anclas responsive</h1>
      <p class="subtitle">Mover, redimensionar y anclar capas con cálculo responsivo en tiempo real.</p>

      <section class="group">
        <h2>Imágenes</h2>
        <div class="field" style="margin-bottom:8px;">
          <label>COFFE BACP (subir/reemplazar)</label>
          <input id="fileCoffee" type="file" accept="image/*" />
        </div>
        <div class="field">
          <label>PACK COFFE (subir/reemplazar)</label>
          <input id="filePack" type="file" accept="image/*" />
        </div>
      </section>

      <section class="group">
        <h2>Capa activa</h2>
        <div class="field">
          <label>Seleccionar capa</label>
          <select id="activeLayer">
            <option value="coffee">COFFE BACP</option>
            <option value="pack">PACK COFFE</option>
          </select>
        </div>
      </section>

      <section class="group">
        <h2>Propiedades de capa</h2>
        <div class="row">
          <div class="field"><label>x</label><input id="x" type="number" step="0.1" /></div>
          <div class="field"><label>y</label><input id="y" type="number" step="0.1" /></div>
        </div>
        <div class="row">
          <div class="field"><label>width</label><input id="width" type="number" step="0.1" min="1" /></div>
          <div class="field"><label>height</label><input id="height" type="number" step="0.1" min="1" /></div>
        </div>
        <div class="row">
          <div class="field"><label>anchorX (0..1)</label><input id="anchorX" type="number" step="0.01" min="0" max="1" /></div>
          <div class="field"><label>anchorY (0..1)</label><input id="anchorY" type="number" step="0.01" min="0" max="1" /></div>
        </div>
        <div class="row">
          <div class="field"><label>scaleX</label><input id="scaleX" type="number" step="0.01" min="0.01" /></div>
          <div class="field"><label>scaleY</label><input id="scaleY" type="number" step="0.01" min="0.01" /></div>
        </div>
        <div class="row">
          <div class="field"><label>opacity (0..1)</label><input id="opacity" type="number" step="0.01" min="0" max="1" /></div>
          <div class="field"><label>zIndex</label><input id="zIndex" type="number" step="1" /></div>
        </div>
      </section>

      <section class="group">
        <h2>Escenario</h2>
        <div class="row">
          <div class="field"><label>Viewport width</label><input id="viewportW" type="number" step="1" min="1" /></div>
          <div class="field"><label>Viewport height</label><input id="viewportH" type="number" step="1" min="1" /></div>
        </div>
        <div class="row">
          <div class="field"><label>Base width</label><input id="baseW" type="number" step="1" min="1" /></div>
          <div class="field"><label>Base height</label><input id="baseH" type="number" step="1" min="1" /></div>
        </div>
      </section>

      <section class="group">
        <h2>JSON</h2>
        <textarea id="jsonArea" placeholder="Pega aquí JSON para importar"></textarea>
        <div class="btn-row">
          <button id="copyBtn" type="button">Copiar JSON</button>
          <button id="importBtn" type="button">Importar JSON</button>
        </div>
        <div id="status" class="status"></div>
      </section>
    </aside>

    <main class="workspace">
      <section class="card">
        <h3>Preview principal (interactivo)</h3>
        <div class="main-stage-wrap">
          <div id="mainStage" class="stage"></div>
        </div>
      </section>

      <section class="card">
        <h3>Previews responsivos</h3>
        <div id="previewGrid" class="preview-grid"></div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      "use strict";

      const DEFAULTS = {
        stage: { viewportW: 1366, viewportH: 768, baseW: 1366, baseH: 768 },
        layers: {
          coffee: {
            name: "COFFE BACP",
            src: "/assets/PAG BRANDING CAFETEROS CO/PNG COFFE/COFFE BACP.png",
            x: 120, y: 120, width: 620, height: 620,
            anchorX: 0.5, anchorY: 0.5,
            scaleX: 1, scaleY: 1,
            opacity: 1, zIndex: 1
          },
          pack: {
            name: "PACK COFFE",
            src: "/assets/PAG BRANDING CAFETEROS CO/PNG COFFE/PACK COFFE.webp",
            x: 760, y: 180, width: 360, height: 520,
            anchorX: 0.5, anchorY: 0.5,
            scaleX: 1, scaleY: 1,
            opacity: 1, zIndex: 2
          }
        },
        activeLayer: "coffee"
      };

      const PRESETS = [
        { w: 375, h: 667 },
        { w: 390, h: 844 },
        { w: 768, h: 1024 },
        { w: 1366, h: 768 },
        { w: 1920, h: 1080 }
      ];

      const state = structuredClone(DEFAULTS);
      let interaction = null;

      const els = {
        mainStage: document.getElementById("mainStage"),
        previewGrid: document.getElementById("previewGrid"),
        status: document.getElementById("status"),
        fileCoffee: document.getElementById("fileCoffee"),
        filePack: document.getElementById("filePack"),
        activeLayer: document.getElementById("activeLayer"),
        x: document.getElementById("x"),
        y: document.getElementById("y"),
        width: document.getElementById("width"),
        height: document.getElementById("height"),
        anchorX: document.getElementById("anchorX"),
        anchorY: document.getElementById("anchorY"),
        scaleX: document.getElementById("scaleX"),
        scaleY: document.getElementById("scaleY"),
        opacity: document.getElementById("opacity"),
        zIndex: document.getElementById("zIndex"),
        viewportW: document.getElementById("viewportW"),
        viewportH: document.getElementById("viewportH"),
        baseW: document.getElementById("baseW"),
        baseH: document.getElementById("baseH"),
        jsonArea: document.getElementById("jsonArea"),
        copyBtn: document.getElementById("copyBtn"),
        importBtn: document.getElementById("importBtn")
      };

      const numericLayerKeys = ["x","y","width","height","anchorX","anchorY","scaleX","scaleY","opacity","zIndex"];
      const numericStageKeys = ["viewportW","viewportH","baseW","baseH"];

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function toNumber(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      }

      function readSafeNumber(obj, key, fallback, min, max) {
        let n = toNumber(obj?.[key], fallback);
        if (Number.isFinite(min)) n = Math.max(min, n);
        if (Number.isFinite(max)) n = Math.min(max, n);
        return n;
      }

      function setStatus(msg, isError) {
        els.status.textContent = msg || "";
        els.status.style.color = isError ? "#fca5a5" : "var(--muted)";
      }

      function getActiveLayer() {
        return state.layers[state.activeLayer];
      }

      function computeFrame(layer, vw, vh, baseW, baseH) {
        const viewportScaleX = vw / baseW;
        const viewportScaleY = vh / baseH;

        const anchorGlobalX = (layer.x + layer.width * layer.anchorX) * viewportScaleX;
        const anchorGlobalY = (layer.y + layer.height * layer.anchorY) * viewportScaleY;

        const displayW = layer.width * viewportScaleX * layer.scaleX;
        const displayH = layer.height * viewportScaleY * layer.scaleY;

        const displayX = anchorGlobalX - displayW * layer.anchorX;
        const displayY = anchorGlobalY - displayH * layer.anchorY;

        return { displayX, displayY, displayW, displayH, anchorGlobalX, anchorGlobalY, viewportScaleX, viewportScaleY };
      }

      function buildPreviewCards() {
        els.previewGrid.innerHTML = "";
        for (const preset of PRESETS) {
          const card = document.createElement("div");
          card.className = "preview-card";
          card.innerHTML = `
            <div class="preview-title">${preset.w} x ${preset.h}</div>
            <div class="preview-stage-wrap">
              <div class="preview-stage" data-w="${preset.w}" data-h="${preset.h}"></div>
            </div>
          `;
          els.previewGrid.appendChild(card);
        }
      }

      function bindInputs() {
        els.activeLayer.addEventListener("change", () => {
          state.activeLayer = els.activeLayer.value === "pack" ? "pack" : "coffee";
          syncInputsFromState();
          render();
        });

        for (const key of numericLayerKeys) {
          const input = els[key];
          input.addEventListener("input", () => {
            const layer = getActiveLayer();
            let value = toNumber(input.value, layer[key]);

            if (key === "anchorX" || key === "anchorY") value = clamp(value, 0, 1);
            if (key === "width" || key === "height") value = Math.max(1, value);
            if (key === "scaleX" || key === "scaleY") value = Math.max(0.01, value);
            if (key === "opacity") value = clamp(value, 0, 1);
            if (key === "zIndex") value = Math.round(value);

            layer[key] = value;
            render();
          });
        }

        for (const key of numericStageKeys) {
          const input = els[key];
          input.addEventListener("input", () => {
            let value = toNumber(input.value, state.stage[key]);
            value = Math.max(1, Math.round(value));
            state.stage[key] = value;
            render();
          });
        }

        els.fileCoffee.addEventListener("change", () => handleFile("coffee", els.fileCoffee.files?.[0]));
        els.filePack.addEventListener("change", () => handleFile("pack", els.filePack.files?.[0]));

        els.copyBtn.addEventListener("click", async () => {
          const json = JSON.stringify(exportConfig(), null, 2);
          els.jsonArea.value = json;
          const copied = await copyToClipboard(json);
          setStatus(copied ? "JSON copiado al portapapeles." : "No se pudo copiar. JSON disponible en el textarea.", !copied);
        });

        els.importBtn.addEventListener("click", () => {
          const raw = els.jsonArea.value.trim();
          if (!raw) {
            setStatus("Pega un JSON válido para importar.", true);
            return;
          }
          try {
            const data = JSON.parse(raw);
            importConfig(data);
            setStatus("Configuración importada correctamente.", false);
            render();
          } catch (err) {
            setStatus("Error al importar JSON: " + (err?.message || "formato inválido"), true);
          }
        });
      }

      async function copyToClipboard(text) {
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
            return true;
          }
        } catch (_) {}
        try {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          const ok = document.execCommand("copy");
          document.body.removeChild(ta);
          return ok;
        } catch (_) {
          return false;
        }
      }

      function handleFile(layerKey, file) {
        if (!file) return;
        if (!file.type.startsWith("image/")) {
          setStatus("El archivo seleccionado no es una imagen válida.", true);
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          if (typeof reader.result === "string") {
            state.layers[layerKey].src = reader.result;
            setStatus(`Imagen de ${state.layers[layerKey].name} actualizada.`, false);
            render();
          } else {
            setStatus("No se pudo cargar la imagen.", true);
          }
        };
        reader.onerror = () => setStatus("Error leyendo el archivo de imagen.", true);
        reader.readAsDataURL(file);
      }

      function syncInputsFromState() {
        const layer = getActiveLayer();
        els.activeLayer.value = state.activeLayer;

        for (const key of numericLayerKeys) {
          els[key].value = String(layer[key]);
        }
        els.viewportW.value = String(state.stage.viewportW);
        els.viewportH.value = String(state.stage.viewportH);
        els.baseW.value = String(state.stage.baseW);
        els.baseH.value = String(state.stage.baseH);
      }

      function exportConfig() {
        return {
          stage: {
            viewportW: state.stage.viewportW,
            viewportH: state.stage.viewportH,
            baseW: state.stage.baseW,
            baseH: state.stage.baseH
          },
          activeLayer: state.activeLayer,
          layers: {
            coffee: { ...state.layers.coffee },
            pack: { ...state.layers.pack }
          }
        };
      }

      function importConfig(data) {
        if (!data || typeof data !== "object") throw new Error("JSON no es un objeto");

        const stage = data.stage || {};
        state.stage.viewportW = readSafeNumber(stage, "viewportW", state.stage.viewportW, 1);
        state.stage.viewportH = readSafeNumber(stage, "viewportH", state.stage.viewportH, 1);
        state.stage.baseW = readSafeNumber(stage, "baseW", state.stage.baseW, 1);
        state.stage.baseH = readSafeNumber(stage, "baseH", state.stage.baseH, 1);

        const layers = data.layers || {};
        for (const key of ["coffee", "pack"]) {
          const srcLayer = layers[key] || {};
          const dst = state.layers[key];

          dst.src = typeof srcLayer.src === "string" && srcLayer.src.trim() ? srcLayer.src : dst.src;
          dst.name = typeof srcLayer.name === "string" && srcLayer.name.trim() ? srcLayer.name : dst.name;
          dst.x = readSafeNumber(srcLayer, "x", dst.x);
          dst.y = readSafeNumber(srcLayer, "y", dst.y);
          dst.width = readSafeNumber(srcLayer, "width", dst.width, 1);
          dst.height = readSafeNumber(srcLayer, "height", dst.height, 1);
          dst.anchorX = readSafeNumber(srcLayer, "anchorX", dst.anchorX, 0, 1);
          dst.anchorY = readSafeNumber(srcLayer, "anchorY", dst.anchorY, 0, 1);
          dst.scaleX = readSafeNumber(srcLayer, "scaleX", dst.scaleX, 0.01);
          dst.scaleY = readSafeNumber(srcLayer, "scaleY", dst.scaleY, 0.01);
          dst.opacity = readSafeNumber(srcLayer, "opacity", dst.opacity, 0, 1);
          dst.zIndex = Math.round(readSafeNumber(srcLayer, "zIndex", dst.zIndex));
        }

        state.activeLayer = data.activeLayer === "pack" ? "pack" : "coffee";
        syncInputsFromState();
      }

      function startInteraction(type, layerKey, event, extra) {
        const layer = state.layers[layerKey];
        const frame = computeFrame(layer, state.stage.viewportW, state.stage.viewportH, state.stage.baseW, state.stage.baseH);

        interaction = {
          type,
          layerKey,
          startClientX: event.clientX,
          startClientY: event.clientY,
          startLayer: { ...layer },
          frameAtStart: frame,
          ...extra
        };
      }

      function onPointerMove(event) {
        if (!interaction) return;

        const layer = state.layers[interaction.layerKey];
        const dx = event.clientX - interaction.startClientX;
        const dy = event.clientY - interaction.startClientY;

        const frame = interaction.frameAtStart;
        const safeScaleX = Math.abs(layer.scaleX) < 0.01 ? 0.01 : layer.scaleX;
        const safeScaleY = Math.abs(layer.scaleY) < 0.01 ? 0.01 : layer.scaleY;

        if (interaction.type === "move") {
          layer.x = interaction.startLayer.x + dx / frame.viewportScaleX;
          layer.y = interaction.startLayer.y + dy / frame.viewportScaleY;
        } else if (interaction.type === "resize") {
          const nextWidth = interaction.startLayer.width + dx / (frame.viewportScaleX * safeScaleX);
          const nextHeight = interaction.startLayer.height + dy / (frame.viewportScaleY * safeScaleY);
          layer.width = Math.max(1, nextWidth);
          layer.height = Math.max(1, nextHeight);
        } else if (interaction.type === "anchor") {
          const px = event.clientX - interaction.stageRect.left;
          const py = event.clientY - interaction.stageRect.top;

          const relX = (px - frame.displayX) / Math.max(1, frame.displayW);
          const relY = (py - frame.displayY) / Math.max(1, frame.displayH);

          layer.anchorX = clamp(relX, 0, 1);
          layer.anchorY = clamp(relY, 0, 1);
        }

        if (state.activeLayer === interaction.layerKey) syncInputsFromState();
        render();
      }

      function onPointerUp() {
        interaction = null;
      }

      function createLayerElement(layerKey, isInteractive, vw, vh) {
        const layer = state.layers[layerKey];
        const frame = computeFrame(layer, vw, vh, state.stage.baseW, state.stage.baseH);

        const el = document.createElement("div");
        el.className = "layer " + layerKey + (state.activeLayer === layerKey && isInteractive ? " active" : "");
        el.style.left = frame.displayX + "px";
        el.style.top = frame.displayY + "px";
        el.style.width = frame.displayW + "px";
        el.style.height = frame.displayH + "px";
        el.style.opacity = String(layer.opacity);
        el.style.zIndex = String(layer.zIndex);
        el.dataset.layer = layerKey;

        const img = document.createElement("img");
        img.alt = layer.name;
        img.src = layer.src;
        img.onerror = () => { img.style.opacity = "0.2"; };
        img.onload = () => { img.style.opacity = "1"; };
        el.appendChild(img);

        if (isInteractive) {
          const badge = document.createElement("div");
          badge.className = "label-badge";
          badge.textContent = layer.name;
          el.appendChild(badge);

          const anchor = document.createElement("div");
          anchor.className = "anchor-handle";
          anchor.style.left = (frame.displayW * layer.anchorX) + "px";
          anchor.style.top = (frame.displayH * layer.anchorY) + "px";
          anchor.title = "Arrastra para mover el ancla";
          anchor.addEventListener("pointerdown", (ev) => {
            ev.preventDefault();
            ev.stopPropagation();
            state.activeLayer = layerKey;
            syncInputsFromState();
            const stageRect = els.mainStage.getBoundingClientRect();
            startInteraction("anchor", layerKey, ev, { stageRect });
          });
          el.appendChild(anchor);

          const resize = document.createElement("div");
          resize.className = "resize-handle";
          resize.title = "Arrastra para redimensionar";
          resize.addEventListener("pointerdown", (ev) => {
            ev.preventDefault();
            ev.stopPropagation();
            state.activeLayer = layerKey;
            syncInputsFromState();
            startInteraction("resize", layerKey, ev);
          });
          el.appendChild(resize);

          el.addEventListener("pointerdown", (ev) => {
            if (ev.button !== 0) return;
            ev.preventDefault();
            state.activeLayer = layerKey;
            syncInputsFromState();
            startInteraction("move", layerKey, ev);
            render();
          });
        }

        return el;
      }

      function renderMainStage() {
        const vw = state.stage.viewportW;
        const vh = state.stage.viewportH;
        els.mainStage.style.width = vw + "px";
        els.mainStage.style.height = vh + "px";
        els.mainStage.innerHTML = "";

        const sorted = Object.keys(state.layers).sort((a, b) => state.layers[a].zIndex - state.layers[b].zIndex);
        for (const key of sorted) {
          els.mainStage.appendChild(createLayerElement(key, true, vw, vh));
        }
      }

      function renderPreviewStages() {
        const nodes = els.previewGrid.querySelectorAll(".preview-stage");
        nodes.forEach((stageNode) => {
          const vw = toNumber(stageNode.dataset.w, 0);
          const vh = toNumber(stageNode.dataset.h, 0);
          stageNode.style.width = vw + "px";
          stageNode.style.height = vh + "px";
          stageNode.innerHTML = "";

          const sorted = Object.keys(state.layers).sort((a, b) => state.layers[a].zIndex - state.layers[b].zIndex);
          for (const key of sorted) {
            stageNode.appendChild(createLayerElement(key, false, vw, vh));
          }
        });
      }

      function render() {
        renderMainStage();
        renderPreviewStages();
      }

      function init() {
        buildPreviewCards();
        bindInputs();
        syncInputsFromState();
        render();

        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", onPointerUp);
        window.addEventListener("pointercancel", onPointerUp);
      }

      init();
    })();
  </script>
</body>
</html>
