<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Windows Media Player icon - nostalgic XP style -->
  <defs>
    <linearGradient id="mpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" fill="url(#mpGrad)" rx="8"/>
  <!-- Blue accent panels -->
  <rect x="20" y="20" width="216" height="80" fill="#0066CC" rx="4"/>
  <rect x="20" y="120" width="216" height="116" fill="#003399" rx="4"/>
  <!-- Play button symbol -->
  <polygon points="110,150 110,210 180,180" fill="#FFD700"/>
  <!-- Highlight shine -->
  <ellipse cx="100" cy="50" rx="40" ry="25" fill="rgba(255,255,255,0.3)"/>
</svg>
