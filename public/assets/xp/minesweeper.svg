<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Windows XP Minesweeper Icon - Authentic Recreation -->
  <defs>
    <linearGradient id="xpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DFDFDF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0A0A0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Yellow background (XP signature color) -->
  <rect width="256" height="256" fill="#FFD700" rx="12"/>
  
  <!-- Grid of game tiles (3x3) with beveled edges -->
  <g>
    <!-- Row 1 -->
    <rect x="28" y="28" width="68" height="68" fill="#DFDFDF" stroke="#FFFFFF" stroke-width="2"/>
    <rect x="100" y="28" width="68" height="68" fill="#DFDFDF" stroke="#FFFFFF" stroke-width="2"/>
    <rect x="172" y="28" width="68" height="68" fill="#DFDFDF" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Row 2 -->
    <rect x="28" y="100" width="68" height="68" fill="#DFDFDF" stroke="#FFFFFF" stroke-width="2"/>
    <rect x="100" y="100" width="68" height="68" fill="#C0C0C0" stroke="#808080" stroke-width="2"/>
    <rect x="172" y="100" width="68" height="68" fill="#DFDFDF" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Row 3 -->
    <rect x="28" y="172" width="68" height="68" fill="#DFDFDF" stroke="#FFFFFF" stroke-width="2"/>
    <rect x="100" y="172" width="68" height="68" fill="#C0C0C0" stroke="#808080" stroke-width="2"/>
    <rect x="172" y="172" width="68" height="68" fill="#DFDFDF" stroke="#FFFFFF" stroke-width="2"/>
  </g>
  
  <!-- Dark shadow edges for 3D effect -->
  <g stroke="#808080" stroke-width="1" fill="none">
    <line x1="30" y1="196" x2="96" y2="196"/>
    <line x1="96" y1="30" x2="96" y2="96"/>
    <line x1="168" y1="30" x2="168" y2="238"/>
  </g>
  
  <!-- Flag indicator on center tile -->
  <polygon points="120,130 125,125 125,135" fill="#FF0000"/>
</svg>
